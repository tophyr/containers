services:
  codex:
    image: ghcr.io/tophyr/tinkerbuild-codex:2026-03-09-r1
    environment:
      HOME: /root
      CODEX_HOME: /root/.codex
    volumes:
      - ${HOME}/.codex:/root/.codex
      - ./:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    restart: unless-stopped
    command: ["sleep", "infinity"]
