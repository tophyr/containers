services:
  codex:
    image: ghcr.io/tophyr/tinkerbuild-codex:2026-03-09
    environment:
      HOME: /home/ubuntu
      CODEX_HOME: /home/ubuntu/.codex
    volumes:
      - codex_state:/home/ubuntu/.codex
      - ../:/workspace
    working_dir: /workspace
    stdin_open: true
    tty: true
    command: ["codex"]

volumes:
  codex_state:
    external: true
